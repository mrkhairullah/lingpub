<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Google Sans", Arial, sans-serif;
        font-size: 13px;
        color: #202124;
        padding: 20px 24px 16px;
        background: #fff;
      }

      .row {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
      }

      .field {
        flex: 1;
      }

      label.field-label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: #5f6368;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 5px;
      }

      input[type="date"],
      select {
        width: 100%;
        height: 36px;
        padding: 0 10px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        font-size: 13px;
        color: #202124;
        background: #fff;
        outline: none;
      }

      input[type="date"]:focus,
      select:focus {
        border-color: #1a73e8;
        box-shadow: 0 0 0 1px #1a73e8;
      }

      .divider {
        border: none;
        border-top: 1px solid #e8eaed;
        margin: 12px 0;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .checkbox-row input[type="checkbox"] {
        width: 15px;
        height: 15px;
        accent-color: #1a73e8;
        cursor: pointer;
        flex-shrink: 0;
      }

      .checkbox-row label {
        font-size: 13px;
        color: #202124;
        cursor: pointer;
      }

      .orientation-group {
        display: flex;
        gap: 16px;
        align-items: center;
        height: 36px;
      }

      .radio-option {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }

      .radio-option input[type="radio"] {
        width: 15px;
        height: 15px;
        accent-color: #1a73e8;
        cursor: pointer;
      }

      .radio-option label {
        font-size: 13px;
        color: #202124;
        cursor: pointer;
      }

      .error {
        font-size: 12px;
        color: #d93025;
        margin-top: -6px;
        margin-bottom: 8px;
        display: none;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 16px;
      }

      button {
        height: 36px;
        padding: 0 18px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border: none;
      }

      .btn-cancel {
        background: transparent;
        color: #1a73e8;
      }
      .btn-cancel:hover {
        background: #f1f3f4;
      }

      .btn-submit {
        background: #1a73e8;
        color: #fff;
      }
      .btn-submit:hover {
        background: #1765cc;
      }
      .btn-submit:disabled {
        background: #dadce0;
        color: #80868b;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="field">
        <label
          class="field-label"
          for="dateStart"
          >Tanggal Awal</label
        >
        <input
          type="date"
          id="dateStart"
        />
      </div>
      <div class="field">
        <label
          class="field-label"
          for="dateEnd"
          >Tanggal Akhir</label
        >
        <input
          type="date"
          id="dateEnd"
        />
      </div>
    </div>

    <p
      class="error"
      id="errorDate"
    ></p>

    <div class="row">
      <div class="field">
        <label
          class="field-label"
          for="status"
          >Status Laporan</label
        >
        <select id="status">
          <option value="">Semua Status</option>
          <option value="Belum Diperiksa">Belum Diperiksa</option>
          <option value="Belum Diterapkan">Belum Diterapkan</option>
          <option value="Diterapkan">Diterapkan</option>
        </select>
      </div>
    </div>

    <hr class="divider" />

    <div class="checkbox-row">
      <input
        type="checkbox"
        id="includeProgress"
      />
      <label for="includeProgress">Sertakan Laporan Progres</label>
    </div>

    <hr class="divider" />

    <div
      class="row"
      style="margin-bottom: 0"
    >
      <div class="field">
        <label
          class="field-label"
          for="paperSize"
          >Ukuran Kertas</label
        >
        <select id="paperSize">
          <option
            value="A4"
            selected
          >
            A4
          </option>
          <option value="A3">A3</option>
          <option value="letter">Letter</option>
          <option value="legal">Legal</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">Orientasi Halaman</label>
        <div class="orientation-group">
          <div class="radio-option">
            <input
              type="radio"
              id="orientPortrait"
              name="orientation"
              value="portrait"
              checked
            />
            <label for="orientPortrait">Potret</label>
          </div>
          <div class="radio-option">
            <input
              type="radio"
              id="orientLandscape"
              name="orientation"
              value="landscape"
            />
            <label for="orientLandscape">Lanskap</label>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button
        class="btn-cancel"
        onclick="google.script.host.close()"
      >
        Batal
      </button>
      <button
        class="btn-submit"
        id="btnSubmit"
        onclick="handleSubmit()"
      >
        Muat Data
      </button>
    </div>

    <script>
      (function setDefaultDates() {
        const today = new Date();
        const oneMonthAgo = new Date(today);
        oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
        document.getElementById("dateEnd").value = toISODate(today);
        document.getElementById("dateStart").value = toISODate(today);
      })();

      function toISODate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      function validateDates() {
        const start = document.getElementById("dateStart").value;
        const end = document.getElementById("dateEnd").value;
        const errorEl = document.getElementById("errorDate");

        if (!start || !end) {
          errorEl.textContent = "Tanggal Awal dan Tanggal Akhir wajib diisi.";
          errorEl.style.display = "block";
          return false;
        }

        if (start > end) {
          errorEl.textContent =
            "Tanggal Awal tidak boleh lebih besar dari Tanggal Akhir.";
          errorEl.style.display = "block";
          return false;
        }

        errorEl.style.display = "none";
        return true;
      }

      document
        .getElementById("dateStart")
        .addEventListener("change", validateDates);
      document
        .getElementById("dateEnd")
        .addEventListener("change", validateDates);

      function handleSubmit() {
        if (!validateDates()) return;

        const btn = document.getElementById("btnSubmit");
        btn.disabled = true;
        btn.textContent = "Memuat...";

        google.script.run
          .withSuccessHandler(() => google.script.host.close())
          .withFailureHandler((err) => {
            btn.disabled = false;
            btn.textContent = "Muat Data";
            const errorEl = document.getElementById("errorDate");
            errorEl.textContent = "Error: " + err.message;
            errorEl.style.display = "block";
          })
          .loadReportsFromFilter({
            tanggalAwal: document.getElementById("dateStart").value,
            tanggalAkhir: document.getElementById("dateEnd").value,
            status: document.getElementById("status").value,
            includeProgress: document.getElementById("includeProgress").checked,
            paperSize: document.getElementById("paperSize").value,
            orientation: document.querySelector(
              'input[name="orientation"]:checked',
            ).value,
          });
      }
    </script>
  </body>
</html>
