<style>
    * {
        box-sizing: border-box;
    }

    html,
    body {
        height: 100%;
        margin: 0;
    }

    .modal {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 24px 32px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .modal__header {
        margin-bottom: 16px;
        flex-shrink: 0;
    }

    .modal__title {
        font-size: 20px;
        font-weight: 600;
        color: #212529;
        margin: 0;
    }

    .modal__body {
        flex: 1;
        overflow-y: auto;
    }

    .form {
        font-size: 14px;
        color: #212529;
        margin-bottom: 16px;
    }

    .form--hidden {
        display: none;
    }

    .form__row {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
    }

    .form__row > .form__field {
        flex: 1;
        min-width: 200px;
    }

    .form__field {
        margin-bottom: 14px;
    }

    .form__field--inline,
    .form__field__container,
    .form__field__container__group {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .form__field--inline {
        flex: 1 1 100%;
    }

    .form__field__label {
        display: block;
        margin-bottom: 4px;
        font-weight: 500;
        color: #212529;
    }

    .form__field__container > .form__field__label {
        margin-bottom: 0;
    }

    .form__field__input {
        display: block;
        width: 100%;
        padding: 6px 12px;
        font-size: 14px;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #ced4da;
        border-radius: 4px;
        transition:
            border-color 0.15s ease-in-out,
            box-shadow 0.15s ease-in-out;
        box-sizing: border-box;
    }

    .form__field__input:focus {
        border-color: #86b7fe;
        outline: 0;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }

    .form__field__container > .form__field__input {
        width: auto;
        flex-shrink: 0;
    }

    select.form__field__input {
        appearance: none;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 12px center;
        background-size: 12px 12px;
        padding-right: 32px;
    }

    input[type='checkbox'].form__field__input,
    input[type='radio'].form__field__input {
        width: 16px;
        height: 16px;
        margin: 0;
        cursor: pointer;
    }

    .form__field__actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
        align-items: center;
        justify-content: end;
    }

    .form__error {
        font-size: 13px;
        color: #dc3545;
        margin: -6px 0 12px;
        display: none;
    }

    .form__error--visible {
        display: block;
    }

    .form__button {
        display: inline-block;
        padding: 6px 16px;
        font-size: 14px;
        font-weight: 400;
        line-height: 1.5;
        text-align: center;
        vertical-align: middle;
        cursor: pointer;
        border: 1px solid transparent;
        border-radius: 4px;
        background-color: #6c757d;
        color: #fff;
        transition:
            background-color 0.15s ease-in-out,
            border-color 0.15s ease-in-out;
    }

    .form__button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
    }

    .form__button--primary {
        background-color: #0d6efd;
        border-color: #0d6efd;
    }

    .form__button--primary:hover:not(:disabled) {
        background-color: #0b5ed7;
        border-color: #0a58ca;
    }

    .form__button--primary:active:not(:disabled) {
        background-color: #0a58ca;
    }

    .form__button--secondary {
        background-color: #fff;
        color: #6c757d;
        border-color: #6c757d;
    }

    .form__button--secondary:hover:not(:disabled) {
        background-color: #6c757d;
        color: #fff;
    }

    .table-wrapper {
        margin-top: 8px;
        border: 1px solid #dee2e6;
        border-radius: 4px;
        max-height: calc(100vh - 420px);
        min-height: 160px;
        overflow-y: auto;
    }

    .table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }

    .table__cell {
        padding: 8px 12px;
        text-align: left;
        border-bottom: 1px solid #e9ecef;
        white-space: nowrap;
    }

    thead .table__cell {
        position: sticky;
        top: 0;
        background-color: #f8f9fa;
        font-weight: 600;
        z-index: 1;
    }

    tbody tr:hover {
        background-color: #f8f9fa;
    }

    .table__cell--checkbox {
        width: 36px;
        text-align: center;
    }

    .table__empty {
        padding: 32px;
        text-align: center;
        color: #6c757d;
        display: none;
    }
</style>
